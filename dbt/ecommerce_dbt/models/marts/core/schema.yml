version: 2

models:
  - name: dim_date
    description: "Date dimension with one row per calendar day"

    columns:
      - name: date_key
        tests:
          - not_null
          - unique

      - name: date
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension enriched with English category translation"

    columns:
      - name: product_key
        tests:
          - not_null
          - unique

      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: "Seller dimension enriched with geolocation data"

    columns:
      - name: seller_key
        tests:
          - unique
          - not_null

      - name: seller_id
        tests:
          - unique
          - not_null
  
  - name: dim_customers
    description: "Customer dimension with SCD type-2"
    
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      
      - name: customer_id
        tests:
          - not_null
      
      - name: is_current
        tests:
          - not_null

  - name: fact_order_items
    description: "Fact table capturing order item transactions"

    columns:
      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id