version: 2

models:
  - name: fact_payments
    description: "Fact table capturing payment transactions for orders"

    columns:
      - name: order_id
        tests:
          - not_null

      - name: payment_sequential
        tests:
          - not_null

      - name: customer_key
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - payment_sequential